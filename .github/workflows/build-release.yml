name: Build and Release Geode Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .geode
        id: build
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Android64

      - name: Locate .geode file
        id: geode
        shell: bash
        run: |
          echo "build-output=${{ steps.build.outputs.build-output }}"
          find "${{ steps.build.outputs.build-output }}" -type f | sed 's/^/output: /'

          GEODE_FILE="$(find "${{ steps.build.outputs.build-output }}" -type f -name '*.geode' | head -n 1)"

          if [ -z "$GEODE_FILE" ]; then
            echo "No .geode file found under build output path" >&2
            exit 1
          fi

          echo "Found .geode: $GEODE_FILE"
          echo "file=$GEODE_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload .geode artifact (Actions tab)
        uses: actions/upload-artifact@v4
        with:
          name: geode-${{ github.sha }}
          path: ${{ steps.geode.outputs.file }}
          if-no-files-found: error

      - name: Publish GitHub Release with .geode asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Build ${{ github.sha }}
          body: |
            Auto-generated .geode build for commit ${{ github.sha }}.
          prerelease: true
          files: ${{ steps.geode.outputs.file }}
